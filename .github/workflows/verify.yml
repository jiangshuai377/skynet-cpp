name: verify

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Configure and run quick verification
        shell: cmd
        run: tools\verify.bat --mode Quick

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Build and run logic suite
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build g++
          bash tools/verify.sh --mode Quick --build-dir build-linux-ci

  coverage-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Run coverage smoke with zero threshold
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build clang llvm g++
          bash tools/run_linux_coverage.sh --gate ReportOnly --thread-count 8 --stress-timeout-seconds 600 --unit-timeout-seconds 300
